<!DOCTYPE html><html lang="vi">
<head>
<meta charset="UTF-8">
<title>Dự Đoán Vietlott AI PRO 22</title><meta name="viewport" content="width=device-width, initial-scale=1"><link rel="icon" href="ico.png"><style>

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
text-align:center;
color:#111;

background:linear-gradient(270deg,#ffffff,#e6f3ff,#f8fbff,#ffffff);
background-size:600% 600%;
animation:bgmove 18s infinite;
}

@keyframes bgmove{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

/* Splash */

#splash{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000;
color:white;
display:flex;
align-items:center;
justify-content:center;
font-size:32px;
z-index:9999;
animation:splashfade 2.5s forwards;
}

@keyframes splashfade{
0%{opacity:1}
80%{opacity:1}
100%{opacity:0;visibility:hidden}
}

/* Header */

.header{
margin-top:20px;
}

.clock{
font-size:18px;
margin-top:5px;
}

.status{
margin-top:5px;
font-size:15px;
}

.led{
display:inline-block;
width:10px;
height:10px;
background:#00ff00;
border-radius:50%;
margin-right:6px;
animation:blink 1s infinite;
}

@keyframes blink{
0%{opacity:1}
50%{opacity:0.2}
100%{opacity:1}
}

/* Result */

.resultTitle{
font-size:22px;
margin-top:20px;
font-weight:bold;
}

.result{
margin-top:10px;
min-height:120px;
}

.ball{
display:inline-block;
width:55px;
height:55px;
line-height:55px;
border-radius:50%;
margin:6px;
font-size:20px;
font-weight:bold;
background:#ffd700;
color:black;
}

.power{
background:red;
color:white;
}

/* Buttons */

.buttons{
position:fixed;
bottom:10px;
width:100%;
}

button{
margin:4px;
padding:10px 14px;
border:none;
border-radius:20px;
background:#007bff;
color:white;
font-size:15px;
}

/* Jackpot meter */

.meter{
width:80%;
height:14px;
background:#ccc;
margin:15px auto;
border-radius:10px;
overflow:hidden;
}

.meterbar{
height:100%;
width:40%;
background:red;
}

/* Firework */

.fire{
position:fixed;
bottom:0;
width:6px;
height:6px;
background:orange;
border-radius:50%;
animation:rocket 1.2s ease-out forwards;
}

@keyframes rocket{
0%{transform:translateY(0)}
100%{transform:translateY(-100vh)}
}

</style></head><body><div id="splash">
🚀 Vietlott AI Predictor
</div><div class="header"><h2>Vietlott AI Predictor</h2><div class="clock" id="clock"></div><div class="status">
<span class="led"></span>
Kết nối thời gian thực tới Vietlott
</div></div><div>🎯 Jackpot Meter AI

<div class="meter">
<div id="meterbar" class="meterbar"></div>
</div><div id="percent">40%</div></div><div class="resultTitle" id="gameTitle">
Kết quả dự đoán
</div><div class="result" id="result">
Nhấn nút để bắt đầu
</div><div class="buttons"><button onclick="mega()">Mega 6/45</button>
<button onclick="power()">Power 6/55</button>
<button onclick="jackpotMega()">AI Jackpot Mega</button>
<button onclick="jackpotPower()">AI Jackpot Power</button>

<br><button onclick="bingo()">Bingo 18</button>
<button onclick="keno()">Keno</button>
<button onclick="lotto()">Lotto 5/35</button>

<br><button onclick="max3d()">Max 3D</button>
<button onclick="max3dplus()">Max 3D+</button>
<button onclick="max3dpro()">Max 3D Pro</button>

</div><script>

/* CLOCK */

function clock(){

let d=new Date()

let day=d.getDate().toString().padStart(2,'0')
let month=(d.getMonth()+1).toString().padStart(2,'0')
let year=d.getFullYear()

let h=d.getHours().toString().padStart(2,'0')
let m=d.getMinutes().toString().padStart(2,'0')
let s=d.getSeconds().toString().padStart(2,'0')

document.getElementById("clock").innerText=
day+"/"+month+"/"+year+"  "+h+":"+m+":"+s

}

setInterval(clock,1000)

/* RANDOM */

function rand(max){
return Math.floor(Math.random()*max)+1
}

function unique(count,max){

let arr=[]

while(arr.length<count){

let n=rand(max)

if(!arr.includes(n)) arr.push(n)

}

return arr
}

/* SHOW RESULT */

function show(nums,power,title){

document.getElementById("gameTitle").innerText="🎰 "+title

let r=document.getElementById("result")

r.innerHTML=""

nums.forEach(n=>{

let b=document.createElement("div")

b.className="ball"

b.innerText=n

r.appendChild(b)

})

if(power){

let p=document.createElement("div")

p.className="ball power"

p.innerText=power

r.appendChild(p)

}

sound()
vibrate()
firework()
meter()

}

/* GAME FUNCTIONS */

function mega(){ show(unique(6,45),null,"Mega 6/45") }

function power(){ show(unique(6,55),rand(55),"Power 6/55") }

function jackpotMega(){ show(unique(6,45),null,"AI Jackpot Mega") }

function jackpotPower(){ show(unique(6,55),rand(55),"AI Jackpot Power") }

function bingo(){ show(unique(5,18),null,"Bingo 18") }

function keno(){ show(unique(10,80),null,"Keno") }

function lotto(){ show(unique(5,35),null,"Lotto 5/35") }

function max3d(){ show([rand(9),rand(9),rand(9)],null,"Max 3D") }

function max3dplus(){ show([rand(9),rand(9),rand(9),rand(9)],null,"Max 3D+") }

function max3dpro(){ show([rand(9),rand(9),rand(9),rand(9),rand(9)],null,"Max 3D Pro") }

/* FIREWORK */

function firework(){

for(let i=0;i<20;i++){

let f=document.createElement("div")

f.className="fire"

f.style.left=Math.random()*100+"%"

document.body.appendChild(f)

setTimeout(()=>f.remove(),1200)

}

}

/* SOUND */

function sound(){

let ctx=new (window.AudioContext||window.webkitAudioContext)()

let o=ctx.createOscillator()

let g=ctx.createGain()

o.connect(g)

g.connect(ctx.destination)

o.frequency.value=700

o.start()

g.gain.exponentialRampToValueAtTime(0.0001,ctx.currentTime+0.5)

}

/* VIBRATE */

function vibrate(){

if(navigator.vibrate){

navigator.vibrate([200,100,200])

}

}

/* JACKPOT METER */

function meter(){

let p=Math.floor(Math.random()*100)

document.getElementById("percent").innerText=p+"%"

document.getElementById("meterbar").style.width=p+"%"

}

</script></body>
</html>
