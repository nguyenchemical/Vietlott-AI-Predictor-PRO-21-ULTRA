<!DOCTYPE html><html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1"><title>Vietlott AI Predictor PRO 19</title><style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
}

.light{
background:white;
color:black;
}

/* RESULT AREA */

#result{
position:absolute;
top:30%;
left:50%;
transform:translate(-50%,-50%);
min-height:80px;
}

/* BALL */

.ball{
display:inline-block;
width:52px;
height:52px;
line-height:52px;
border-radius:50%;
background:gold;
color:black;
font-weight:bold;
margin:6px;
font-size:18px;

opacity:0;
transform:scale(0.5);

animation:pop 0.4s forwards;
}

@keyframes pop{
to{
opacity:1;
transform:scale(1);
}
}

/* STATUS */

.status{
margin-top:15px;
color:#22c55e;
font-weight:bold;
cursor:pointer;
}

/* BUTTON BAR */

.controls{

position:fixed;
bottom:0;
left:0;
right:0;

background:#111827;

padding:12px;

display:flex;
flex-wrap:wrap;
justify-content:center;

}

.controls button{

margin:4px;
padding:8px 12px;
border:none;
border-radius:15px;
background:gold;
color:black;
font-weight:bold;
font-size:13px;

}

/* POPUP */

.popup{
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
background:rgba(0,0,0,0.8);
display:none;
align-items:center;
justify-content:center;
}

.popup-box{
background:#1e293b;
padding:40px;
border-radius:15px;
width:90%;
max-width:500px;
}

select{
font-size:20px;
padding:10px;
margin:6px;
}

canvas{
position:fixed;
top:0;
left:0;
pointer-events:none;
}

</style></head><body><canvas id="firework"></canvas>

<h2>Vietlott AI Predictor PRO 19</h2><div class="status" onclick="openVietlott()">
✓ Đang kết nối thời gian thực đến Vietlott
</div><div id="result"></div><!-- CONTROLS --><div class="controls"><button onclick="predictMega()">Mega</button>
<button onclick="predictPower()">Power</button>
<button onclick="predictKeno()">Keno</button>

<button onclick="predictMax3D()">Max3D</button>
<button onclick="predictMax3DPlus()">Max3D+</button>
<button onclick="predictMax3DPro()">Max3DPro</button>

<button onclick="predictBingo()">Bingo</button>
<button onclick="predictLotto()">Lotto</button>

<button onclick="jackpotMega()">AI Mega</button>
<button onclick="jackpotPower()">AI Power</button>

<button onclick="openBirth()">Ngày sinh</button>
<button onclick="toggleTheme()">Theme</button>

</div><!-- POPUP --><div class="popup" id="birthPopup"><div class="popup-box"><h2>Chọn ngày sinh</h2><select id="day"></select>
<select id="month"></select>
<select id="year"></select>

<br><br>

<button onclick="generateBirth()">Tạo số</button>
<button onclick="closeBirth()">Đóng</button>

</div></div><script>

/* SOUND */

function playSound(){

let ctx=new (window.AudioContext||window.webkitAudioContext)()

let o=ctx.createOscillator()

o.frequency.value=700
o.type="triangle"

o.connect(ctx.destination)

o.start()

setTimeout(()=>o.stop(),120)

}

/* VIBRATION */

function vibrate(){

if("vibrate" in navigator){

navigator.vibrate(100)

}

}

/* RANDOM */

function randomUnique(max,count){

let arr=[]

while(arr.length<count){

let n=Math.floor(Math.random()*max)+1

if(!arr.includes(n)) arr.push(n)

}

return arr.sort((a,b)=>a-b)

}

/* DISPLAY */

async function showNumbers(nums,power){

let r=document.getElementById("result")

r.innerHTML=""

for(let n of nums){

await new Promise(res=>setTimeout(res,200))

let d=document.createElement("div")

d.className="ball"

d.innerText=n

r.appendChild(d)

playSound()

}

if(power){

await new Promise(res=>setTimeout(res,200))

let p=document.createElement("div")

p.className="ball"

p.style.background="red"

p.style.color="white"

p.innerText=power

r.appendChild(p)

}

vibrate()

firework()

}

function showText(t){

document.getElementById("result").innerHTML="<h1>"+t+"</h1>"

playSound()
vibrate()
firework()

}

/* GAMES */

function predictMega(){

showNumbers(randomUnique(45,6))

}

function predictPower(){

let nums=randomUnique(55,6)

let power=Math.floor(Math.random()*55)+1

showNumbers(nums,power)

}

function predictKeno(){

showNumbers(randomUnique(80,10))

}

function predictMax3D(){

let n=Math.floor(Math.random()*1000).toString().padStart(3,"0")

showText(n)

}

function predictMax3DPlus(){

let a=Math.floor(Math.random()*1000).toString().padStart(3,"0")
let b=Math.floor(Math.random()*1000).toString().padStart(3,"0")

showText(a+" | "+b)

}

function predictMax3DPro(){

predictMax3DPlus()

}

function predictBingo(){

showNumbers(randomUnique(90,18))

}

function predictLotto(){

showNumbers(randomUnique(35,5))

}

function jackpotMega(){

predictMega()

}

function jackpotPower(){

predictPower()

}

/* THEME */

function toggleTheme(){

document.body.classList.toggle("light")

}

/* VIETLOTT */

function openVietlott(){

window.open("https://vietlott.vn")

}

/* POPUP */

function openBirth(){

birthPopup.style.display="flex"

}

function closeBirth(){

birthPopup.style.display="none"

}

/* BIRTH */

function generateBirth(){

let seed=+day.value + +month.value + +year.value

let nums=[]

while(nums.length<6){

let n=(seed*Math.random()*100)%45

n=Math.floor(n)+1

if(!nums.includes(n)) nums.push(n)

}

showNumbers(nums)

closeBirth()

}

/* DROPDOWN */

for(let i=1;i<=31;i++) day.innerHTML+=`<option>${i}</option>`
for(let i=1;i<=12;i++) month.innerHTML+=`<option>${i}</option>`
for(let i=1950;i<=2035;i++) year.innerHTML+=`<option>${i}</option>`

/* FIREWORK */

const canvas=document.getElementById("firework")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let particles=[]

function firework(){

for(let i=0;i<80;i++){

particles.push({

x:canvas.width/2,
y:canvas.height,

vx:(Math.random()-0.5)*6,
vy:-Math.random()*8,

life:60

})

}

}

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height)

particles.forEach(p=>{

p.x+=p.vx
p.y+=p.vy
p.vy+=0.1
p.life--

ctx.fillStyle="gold"

ctx.fillRect(p.x,p.y,3,3)

})

particles=particles.filter(p=>p.life>0)

requestAnimationFrame(animate)

}

animate()

</script></body>
</html>
