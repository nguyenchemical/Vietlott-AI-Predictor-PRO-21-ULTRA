<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Vietlott AI Predictor PRO 21 ULTRA</title>

<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">

<style>

body{
margin:0;
font-family:Arial;
color:white;
text-align:center;

background:linear-gradient(270deg,#1a1a2e,#16213e,#0f3460,#533483);
background-size:600% 600%;
animation:bgmove 20s infinite;
}

@keyframes bgmove{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

h1{
font-size:34px;
margin-top:20px;
}

.status{
color:#00ff9c;
font-size:16px;
margin-bottom:10px;
}

.result{
margin-top:30px;
min-height:120px;
}

.ball{
display:inline-block;
width:60px;
height:60px;
line-height:60px;
border-radius:50%;
margin:6px;
font-size:22px;
font-weight:bold;
background:gold;
color:black;
}

.power{
background:red;
color:white;
}

.buttons{
position:fixed;
bottom:10px;
width:100%;
}

button{
margin:5px;
padding:10px 16px;
border:none;
border-radius:20px;
background:gold;
color:black;
font-size:16px;
}

.meter{
width:80%;
height:14px;
background:#333;
margin:20px auto;
border-radius:10px;
overflow:hidden;
}

.meterbar{
height:100%;
width:40%;
background:red;
}

.fire{
position:fixed;
bottom:0;
width:6px;
height:6px;
background:yellow;
border-radius:50%;
animation:rocket 1.2s ease-out forwards;
}

@keyframes rocket{
0%{transform:translateY(0)}
100%{transform:translateY(-100vh)}
}

</style>
</head>

<body>

<h1>Vietlott AI Predictor</h1>

<div class="status">✔ Đang kết nối dữ liệu Vietlott</div>

<div>

🎯 Jackpot Meter AI

<div class="meter">
<div id="meterbar" class="meterbar"></div>
</div>

<div id="percent">40%</div>

</div>

<div class="result" id="result">
Nhấn nút để AI dự đoán
</div>

<div class="buttons">

<button onclick="mega()">Mega 6/45</button>
<button onclick="power()">Power 6/55</button>
<button onclick="jackpotMega()">AI Jackpot Mega</button>
<button onclick="jackpotPower()">AI Jackpot Power</button>

<br>

<button onclick="bingo()">Bingo 18</button>
<button onclick="keno()">Keno</button>
<button onclick="lotto()">Lotto 5/35</button>

<br>

<button onclick="max3d()">Max 3D</button>
<button onclick="max3dplus()">Max 3D+</button>
<button onclick="max3dpro()">Max 3D Pro</button>

</div>

<script>

function rand(max){
return Math.floor(Math.random()*max)+1
}

function unique(count,max){

let arr=[]

while(arr.length<count){

let n=rand(max)

if(!arr.includes(n)) arr.push(n)

}

return arr
}

function show(nums,power){

let r=document.getElementById("result")

r.innerHTML=""

nums.forEach(n=>{

let b=document.createElement("div")

b.className="ball"

b.innerText=n

r.appendChild(b)

})

if(power){

let p=document.createElement("div")

p.className="ball power"

p.innerText=power

r.appendChild(p)

}

sound()

vibrate()

firework()

meter()

}

function mega(){

show(unique(6,45))

}

function power(){

show(unique(6,55),rand(55))

}

function jackpotMega(){

show(unique(6,45))

}

function jackpotPower(){

show(unique(6,55),rand(55))

}

function bingo(){

show(unique(5,18))

}

function keno(){

show(unique(10,80))

}

function lotto(){

show(unique(5,35))

}

function max3d(){

show([rand(9),rand(9),rand(9)])

}

function max3dplus(){

show([rand(9),rand(9),rand(9),rand(9)])

}

function max3dpro(){

show([rand(9),rand(9),rand(9),rand(9),rand(9)])

}

function firework(){

for(let i=0;i<20;i++){

let f=document.createElement("div")

f.className="fire"

f.style.left=Math.random()*100+"%"

document.body.appendChild(f)

setTimeout(()=>f.remove(),1200)

}

}

function sound(){

let ctx=new (window.AudioContext||window.webkitAudioContext)()

let o=ctx.createOscillator()

let g=ctx.createGain()

o.connect(g)

g.connect(ctx.destination)

o.frequency.value=700

o.start()

g.gain.exponentialRampToValueAtTime(0.0001,ctx.currentTime+0.5)

}

function vibrate(){

if(navigator.vibrate){

navigator.vibrate([200,100,200])

}

}

function meter(){

let p=Math.floor(Math.random()*100)

document.getElementById("percent").innerText=p+"%"

document.getElementById("meterbar").style.width=p+"%"

}

</script>

</body>
</html>
