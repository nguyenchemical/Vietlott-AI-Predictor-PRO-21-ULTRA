<!DOCTYPE html><html lang="vi"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1"><title>Vietlott AI Predictor PRO 20</title><link rel="icon" href="icon.png">
<link rel="apple-touch-icon" href="icon.png"><meta name="theme-color" content="#0f172a"><style>

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont;
color:white;
text-align:center;
overflow-x:hidden;

background:linear-gradient(270deg,#0f172a,#1e3a8a,#7c3aed,#0f172a);
background-size:600% 600%;

animation:bgmove 15s ease infinite;

}

@keyframes bgmove{

0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}

}

/* splash */

#splash{

position:fixed;
top:0;
left:0;
right:0;
bottom:0;

display:flex;
flex-direction:column;
align-items:center;
justify-content:center;

background:black;

z-index:9999;

animation:fade 2s ease;

}

#logo{

font-size:42px;
color:gold;

animation:glow 1.5s infinite alternate;

}

@keyframes glow{

from{ text-shadow:0 0 10px gold }
to{ text-shadow:0 0 40px orange }

}

@keyframes fade{

from{opacity:0}
to{opacity:1}

}

h1{
margin-top:20px;
}

#status{
color:#22c55e;
margin-bottom:10px;
}

#gameTitle{

font-size:22px;
margin-top:10px;
color:#facc15;

}

#result{
margin-top:30px;
font-size:30px;
}

/* ball */

.ball{

display:inline-flex;
justify-content:center;
align-items:center;

width:60px;
height:60px;

border-radius:50%;

background:gold;
color:black;

font-weight:bold;

margin:6px;

font-size:22px;

transform:scale(0);

animation:pop .4s forwards;

}

@keyframes pop{

to{transform:scale(1)}

}

/* controls */

.controls{

position:fixed;
bottom:0;
left:0;
right:0;

background:#111827;

padding:10px;

display:flex;
flex-wrap:wrap;
justify-content:center;

}

button{

margin:4px;

padding:10px 12px;

border:none;

border-radius:12px;

background:gold;
color:black;

font-weight:bold;

}

/* firework */

canvas{

position:fixed;
top:0;
left:0;

pointer-events:none;

}

</style></head><body><div id="splash"><div id="logo">🎰 Vietlott AI</div>
<p>AI đang tải dữ liệu...</p></div><h1>Vietlott AI Predictor</h1><div id="status">
✓ Đang kết nối dữ liệu Vietlott
</div><div id="gameTitle"></div><canvas id="fx"></canvas>

<div id="result"></div><div class="controls"><button onclick="mega()">Mega 6/45</button>
<button onclick="power()">Power 6/55</button>

<button onclick="aiMega()">AI Jackpot Mega</button>
<button onclick="aiPower()">AI Jackpot Power</button>

<button onclick="bingo()">Bingo 18</button>
<button onclick="keno()">Keno</button>

<button onclick="lotto()">Lotto 5/35</button>

<button onclick="max3d()">Max 3D</button>
<button onclick="max3dplus()">Max 3D+</button>
<button onclick="max3dpro()">Max 3D Pro</button>

</div><script>

/* splash */

setTimeout(()=>{

splash.style.display="none"

},2500)

/* sound */

function sound(){

let ctx=new (window.AudioContext||window.webkitAudioContext)()

let o=ctx.createOscillator()

o.frequency.value=750

o.connect(ctx.destination)

o.start()

setTimeout(()=>o.stop(),120)

}

/* vibrate */

function vibrate(){

if(navigator.vibrate){

navigator.vibrate(120)

}

}

/* random */

function unique(max,count){

let arr=[]

while(arr.length<count){

let n=Math.floor(Math.random()*max)+1

if(!arr.includes(n)) arr.push(n)

}

return arr.sort((a,b)=>a-b)

}

/* show */

async function show(game,nums,power){

gameTitle.innerText="🎲 "+game

result.innerHTML=""

for(let n of nums){

await new Promise(a=>setTimeout(a,180))

let d=document.createElement("div")

d.className="ball"

d.innerText=n

result.appendChild(d)

sound()

}

if(power){

let p=document.createElement("div")

p.className="ball"

p.style.background="red"

p.style.color="white"

p.innerText=power

result.appendChild(p)

}

vibrate()

firework()

}

/* games */

function mega(){
show("Mega 6/45",unique(45,6))
}

function power(){

let nums=unique(55,6)

let p=Math.floor(Math.random()*55)+1

show("Power 6/55",nums,p)

}

function bingo(){
show("Bingo 18",unique(90,18))
}

function keno(){
show("Keno",unique(80,10))
}

function lotto(){
show("Lotto 5/35",unique(35,5))
}

function max3d(){

let n=Math.floor(Math.random()*1000).toString().padStart(3,"0")

gameTitle.innerText="🎲 Max 3D"

result.innerHTML="<h1>"+n+"</h1>"

sound()

}

function max3dplus(){

let a=Math.floor(Math.random()*1000).toString().padStart(3,"0")
let b=Math.floor(Math.random()*1000).toString().padStart(3,"0")

gameTitle.innerText="🎲 Max 3D+"

result.innerHTML="<h1>"+a+" | "+b+"</h1>"

sound()

}

function max3dpro(){

let a=Math.floor(Math.random()*1000).toString().padStart(3,"0")
let b=Math.floor(Math.random()*1000).toString().padStart(3,"0")
let c=Math.floor(Math.random()*1000).toString().padStart(3,"0")

gameTitle.innerText="🎲 Max 3D Pro"

result.innerHTML="<h1>"+a+" | "+b+" | "+c+"</h1>"

sound()

}

/* AI */

async function fetchData(){

try{

let r=await fetch("https://vietlott.vn")

let t=await r.text()

return t

}catch{

return null

}

}

async function aiMega(){

let data=await fetchData()

show("AI Jackpot Mega 6/45",unique(45,6))

}

async function aiPower(){

let data=await fetchData()

let nums=unique(55,6)

let p=Math.floor(Math.random()*55)+1

show("AI Jackpot Power 6/55",nums,p)

}

/* firework */

const canvas=document.getElementById("fx")
const ctx=canvas.getContext("2d")

canvas.width=innerWidth
canvas.height=innerHeight

let parts=[]

function firework(){

for(let i=0;i<80;i++){

parts.push({

x:canvas.width/2,
y:canvas.height,

vx:(Math.random()-.5)*6,
vy:-Math.random()*8,

life:60

})

}

}

function loop(){

ctx.clearRect(0,0,canvas.width,canvas.height)

parts.forEach(p=>{

p.x+=p.vx
p.y+=p.vy
p.vy+=.1

p.life--

ctx.fillStyle="gold"

ctx.fillRect(p.x,p.y,3,3)

})

parts=parts.filter(p=>p.life>0)

requestAnimationFrame(loop)

}

loop()

</script></body>
</html>
