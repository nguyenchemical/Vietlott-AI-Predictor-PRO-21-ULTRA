<!DOCTYPE html><html lang="vi">
<head><meta charset="UTF-8">
<title>Trợ Lý Dự Đoán Vietlott AI QUANTUM</title><meta name="viewport" content="width=device-width, initial-scale=1"><link rel="icon" href="icon.png">
<link rel="apple-touch-icon" href="icon.png"><meta name="theme-color" content="#000000"><style>

body{
margin:0;
font-family:Arial;
text-align:center;
color:white;

background:linear-gradient(270deg,#1a1a2e,#16213e,#0f3460,#533483);
background-size:600% 600%;
animation:bgmove 20s infinite;
}

@keyframes bgmove{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

#splash{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
color:white;
display:flex;
align-items:center;
justify-content:center;
font-size:34px;
z-index:9999;
animation:splashfade 3s forwards;
}

@keyframes splashfade{
0%{opacity:1}
80%{opacity:1}
100%{opacity:0;visibility:hidden}
}

.logo img{
width:80px;
margin-top:20px;
}

.clock{
margin-top:5px;
font-size:16px;
}

.status{
margin-top:6px;
}

.led{
display:inline-block;
width:10px;
height:10px;
background:#00ff00;
border-radius:50%;
margin-right:6px;
animation:blink 1s infinite;
}

@keyframes blink{
0%{opacity:1}
50%{opacity:0.3}
100%{opacity:1}
}

.resultTitle{
font-size:22px;
margin-top:15px;
}

.result{
margin-top:20px;
min-height:120px;
}

.ball{
display:inline-block;
width:55px;
height:55px;
line-height:55px;
border-radius:50%;
margin:6px;
font-size:20px;
font-weight:bold;
background:gold;
color:black;
box-shadow:0 0 12px gold;
}

.power{
background:red;
color:white;
}

button{
margin:4px;
padding:9px 14px;
border:none;
border-radius:20px;
background:gold;
color:black;
}

.buttons{
position:fixed;
bottom:10px;
width:100%;
}

.meter{
width:80%;
height:12px;
background:#333;
margin:15px auto;
border-radius:10px;
overflow:hidden;
}

.meterbar{
height:100%;
width:30%;
background:red;
}

.fire{
position:fixed;
bottom:0;
width:6px;
height:6px;
background:orange;
border-radius:50%;
animation:rocket 1.2s ease-out forwards;
}

@keyframes rocket{
0%{transform:translateY(0)}
100%{transform:translateY(-100vh)}
}

.popup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#222;
padding:30px;
border-radius:15px;
display:none;
width:90%;
max-width:420px;
}

.popup select{
width:100%;
padding:15px;
font-size:20px;
margin-top:10px;
}

.popup button{
width:100%;
padding:15px;
font-size:20px;
margin-top:10px;
}

</style></head><body><div id="splash">🎰 Vietlott AI QUANTUM</div><div class="logo">
<img src="icon.png">
<h2>Trợ Lý Dự Đoán Vietlott AI</h2>
</div><div class="clock" id="clock"></div><div class="status">
<span class="led"></span>
Đang kết nối tới Vietlott
</div><div class="meter">
<div id="meterbar" class="meterbar"></div>
</div><div id="percent">40%</div><div class="resultTitle" id="gameTitle">
Kết quả dự đoán
</div><div id="result" class="result">
Nhấn nút để dự đoán
</div><button onclick="birth()">🎂 Dự đoán theo ngày sinh</button>

<button onclick="aiMega()">🤖 AI Mega</button>
<button onclick="aiPower()">🤖 AI Power</button>

<div id="birthPopup" class="popup"><h3>Chọn ngày sinh</h3><select id="day"></select>
<select id="month"></select>
<select id="year"></select>

<button onclick="predictBirth()">Dự đoán</button>
<button onclick="closeBirth()">Đóng</button>

</div><div class="buttons"><button onclick="mega()">Mega 6/45</button>
<button onclick="power()">Power 6/55</button>
<button onclick="bingo()">Bingo 18</button>
<button onclick="keno()">Keno</button>

<br><button onclick="lotto()">Lotto 5/35</button>
<button onclick="max3d()">Max 3D</button>
<button onclick="max3dplus()">Max 3D+</button>
<button onclick="max3dpro()">Max 3D Pro</button>

</div><script>

/* CLOCK */

function clock(){

let d=new Date()

let day=d.getDate().toString().padStart(2,'0')
let month=(d.getMonth()+1).toString().padStart(2,'0')
let year=d.getFullYear()

let h=d.getHours().toString().padStart(2,'0')
let m=d.getMinutes().toString().padStart(2,'0')
let s=d.getSeconds().toString().padStart(2,'0')

document.getElementById("clock").innerText=
day+"/"+month+"/"+year+" "+h+":"+m+":"+s

}

setInterval(clock,1000)

/* RANDOM */

function rand(max){
return Math.floor(Math.random()*max)+1
}

function unique(count,max){

let arr=[]

while(arr.length<count){

let n=rand(max)

if(!arr.includes(n)) arr.push(n)

}

return arr

}

/* SHOW RESULT */

function show(nums,power,title){

document.getElementById("gameTitle").innerText="🎰 "+title

let r=document.getElementById("result")

r.innerHTML=""

nums.forEach(n=>{

let b=document.createElement("div")
b.className="ball"
b.innerText=n
r.appendChild(b)

})

if(power){

let p=document.createElement("div")
p.className="ball power"
p.innerText=power
r.appendChild(p)

}

meter()
firework()

}

/* GAMES */

function mega(){ show(unique(6,45),null,"Mega 6/45") }

function power(){ show(unique(6,55),rand(55),"Power 6/55") }

function bingo(){ show(unique(5,18),null,"Bingo 18") }

function keno(){ show(unique(10,80),null,"Keno") }

function lotto(){ show(unique(5,35),null,"Lotto 5/35") }

function max3d(){ show([rand(9),rand(9),rand(9)],null,"Max 3D") }

function max3dplus(){ show([rand(9),rand(9),rand(9),rand(9)],null,"Max 3D+") }

function max3dpro(){ show([rand(9),rand(9),rand(9),rand(9),rand(9)],null,"Max 3D Pro") }

/* AI PREDICT */

function aiMega(){

let nums=unique(6,45)

show(nums,null,"AI dự đoán Mega 6/45")

}

function aiPower(){

let nums=unique(6,55)

show(nums,rand(55),"AI dự đoán Power 6/55")

}

/* METER */

function meter(){

let p=Math.floor(Math.random()*100)

document.getElementById("percent").innerText=p+"%"

document.getElementById("meterbar").style.width=p+"%"

}

/* FIREWORK */

function firework(){

for(let i=0;i<20;i++){

let f=document.createElement("div")
f.className="fire"
f.style.left=Math.random()*100+"%"

document.body.appendChild(f)

setTimeout(()=>f.remove(),1200)

}

}

/* BIRTH */

function birth(){

document.getElementById("birthPopup").style.display="block"

}

function closeBirth(){

document.getElementById("birthPopup").style.display="none"

}

function predictBirth(){

show(unique(6,45),null,"Dự đoán theo ngày sinh")

}

/* SELECT */

for(let i=1;i<=31;i++){

let o=document.createElement("option")
o.text=i
day.add(o)

}

for(let i=1;i<=12;i++){

let o=document.createElement("option")
o.text=i
month.add(o)

}

for(let i=1950;i<=2025;i++){

let o=document.createElement("option")
o.text=i
year.add(o)

}

</script></body>
</html>
