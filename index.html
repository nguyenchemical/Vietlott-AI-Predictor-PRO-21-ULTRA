<!DOCTYPE html><html lang="vi">
<head>
<meta charset="UTF-8">
<title>Vietlott AI Predictor PRO 25 MEGA</title><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="icon" href="icon.png"><style>

body{
margin:0;
font-family:Arial;
text-align:center;
color:white;

background:linear-gradient(270deg,#1a1a2e,#16213e,#0f3460,#533483);
background-size:600% 600%;
animation:bgmove 20s infinite;
}

@keyframes bgmove{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

.logo img{
width:80px;
margin-top:20px;
}

.clock{
margin-top:5px;
font-size:16px;
}

.status{
margin-top:6px;
}

.led{
display:inline-block;
width:10px;
height:10px;
background:#00ff00;
border-radius:50%;
margin-right:6px;
animation:blink 1s infinite;
}

@keyframes blink{
0%{opacity:1}
50%{opacity:0.3}
100%{opacity:1}
}

.resultTitle{
font-size:22px;
margin-top:15px;
}

.result{
margin-top:10px;
min-height:120px;
}

.ball{
display:inline-block;
width:55px;
height:55px;
line-height:55px;
border-radius:50%;
margin:6px;
font-size:20px;
font-weight:bold;
background:gold;
color:black;
box-shadow:0 0 10px gold;
}

.power{
background:red;
color:white;
}

.meter{
width:80%;
height:12px;
background:#444;
margin:15px auto;
border-radius:10px;
overflow:hidden;
}

.meterbar{
height:100%;
width:40%;
background:red;
}

canvas{
margin-top:10px;
}

.buttons{
position:fixed;
bottom:10px;
width:100%;
}

button{
margin:4px;
padding:9px 14px;
border:none;
border-radius:20px;
background:gold;
color:black;
}

.fire{
position:fixed;
bottom:0;
width:6px;
height:6px;
background:orange;
border-radius:50%;
animation:rocket 1.2s ease-out forwards;
}

@keyframes rocket{
0%{transform:translateY(0)}
100%{transform:translateY(-100vh)}
}

</style></head><body><div class="logo">
<img src="icon.png">
<h2>Vietlott AI Predictor</h2>
</div><div class="clock" id="clock"></div><div class="status">
<span class="led"></span>
Kết nối dữ liệu Vietlott
</div>🎯 Jackpot Meter AI

<div class="meter">
<div id="meterbar" class="meterbar"></div>
</div><div id="percent">40%</div><div class="resultTitle" id="gameTitle">
Kết quả dự đoán
</div><div class="result" id="result">
Nhấn nút để bắt đầu
</div><canvas id="chart" width="320" height="120"></canvas>
<canvas id="wheel" width="200" height="200"></canvas>

<div id="heatmap"></div><div class="buttons"><button onclick="mega()">Mega 6/45</button>
<button onclick="power()">Power 6/55</button>
<button onclick="bingo()">Bingo 18</button>
<button onclick="keno()">Keno</button>

<br><button onclick="lotto()">Lotto 5/35</button>
<button onclick="max3d()">Max 3D</button>
<button onclick="max3dplus()">Max 3D+</button>
<button onclick="max3dpro()">Max 3D Pro</button>

<br><button onclick="spin()">🎰 Máy quay số</button>

</div><script>

/* CLOCK */

function clock(){

let d=new Date()

let day=d.getDate().toString().padStart(2,'0')
let month=(d.getMonth()+1).toString().padStart(2,'0')
let year=d.getFullYear()

let h=d.getHours().toString().padStart(2,'0')
let m=d.getMinutes().toString().padStart(2,'0')
let s=d.getSeconds().toString().padStart(2,'0')

document.getElementById("clock").innerText=
day+"/"+month+"/"+year+" "+h+":"+m+":"+s

}

setInterval(clock,1000)

/* RANDOM */

function rand(max){
return Math.floor(Math.random()*max)+1
}

function unique(count,max){

let arr=[]

while(arr.length<count){

let n=rand(max)

if(!arr.includes(n)) arr.push(n)

}

return arr
}

/* SHOW RESULT */

function show(nums,power,title){

document.getElementById("gameTitle").innerText="🎰 "+title

let r=document.getElementById("result")

r.innerHTML=""

nums.forEach(n=>{

let b=document.createElement("div")
b.className="ball"
b.innerText=n
r.appendChild(b)

})

if(power){

let p=document.createElement("div")
p.className="ball power"
p.innerText=power
r.appendChild(p)

}

meter()
chart()
heatmap()
firework()
sound()
vibrate()

}

/* GAMES */

function mega(){ show(unique(6,45),null,"Mega 6/45") }

function power(){ show(unique(6,55),rand(55),"Power 6/55") }

function bingo(){ show(unique(5,18),null,"Bingo 18") }

function keno(){ show(unique(10,80),null,"Keno") }

function lotto(){ show(unique(5,35),null,"Lotto 5/35") }

function max3d(){ show([rand(9),rand(9),rand(9)],null,"Max 3D") }

function max3dplus(){ show([rand(9),rand(9),rand(9),rand(9)],null,"Max 3D+") }

function max3dpro(){ show([rand(9),rand(9),rand(9),rand(9),rand(9)],null,"Max 3D Pro") }

/* WHEEL SIMULATION */

function spin(){

document.getElementById("gameTitle").innerText="🎰 Máy quay Vietlott"

let c=document.getElementById("wheel")
let ctx=c.getContext("2d")

ctx.clearRect(0,0,200,200)

for(let i=0;i<20;i++){

ctx.beginPath()
ctx.arc(100,100,80,0,Math.PI*2)
ctx.strokeStyle="gold"
ctx.stroke()

}

setTimeout(()=>mega(),2000)

}

/* JACKPOT METER */

function meter(){

let p=Math.floor(Math.random()*100)

document.getElementById("percent").innerText=p+"%"

document.getElementById("meterbar").style.width=p+"%"

}

/* CHART */

function chart(){

let c=document.getElementById("chart")
let ctx=c.getContext("2d")

ctx.clearRect(0,0,320,120)

for(let i=0;i<20;i++){

let x=i*15
let h=Math.random()*100

ctx.fillStyle="cyan"
ctx.fillRect(x,120-h,10,h)

}

}

/* HEATMAP */

function heatmap(){

let t="🔥 Heatmap số nóng: "

for(let i=1;i<=10;i++){

t+=i+"("+Math.floor(Math.random()*100)+"%) "

}

document.getElementById("heatmap").innerText=t

}

/* EFFECTS */

function firework(){

for(let i=0;i<20;i++){

let f=document.createElement("div")
f.className="fire"
f.style.left=Math.random()*100+"%"

document.body.appendChild(f)

setTimeout(()=>f.remove(),1200)

}

}

function sound(){

let ctx=new (window.AudioContext||window.webkitAudioContext)()

let o=ctx.createOscillator()
let g=ctx.createGain()

o.connect(g)
g.connect(ctx.destination)

o.frequency.value=700
o.start()

g.gain.exponentialRampToValueAtTime(0.0001,ctx.currentTime+0.5)

}

function vibrate(){

if(navigator.vibrate){
navigator.vibrate([200,100,200])
}

}

</script></body>
</html>
